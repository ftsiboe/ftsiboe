name: Build site & refresh metrics

# One workflow that keeps the GitHub Pages site current:
#   1. refreshes data-raw/scholar-metrics.json from Google Scholar (live badges read it),
#   2. rebuilds every page from its .Rmd source via data-raw/scripts/render.R,
#   3. commits any changes here (this repo = R package + GitHub profile README), and
#   4. deploys the built site (docs/) to the ftsiboe/ftsiboe.github.io repo, which
#      serves at the root URL https://ftsiboe.github.io/ .
# The index builds from data-raw/publications/risk-management/links.csv (tracked),
# so it works in CI without the (gitignored) PDFs.
#
# CROSS-REPO DEPLOY: step 4 pushes docs/ into the separate user-page repo using an
# SSH deploy key. One-time setup (see MAINTAINING.md):
#   - generate a keypair; add the PUBLIC key as a write-enabled Deploy Key on
#     ftsiboe/ftsiboe.github.io, and the PRIVATE key as the secret ACTIONS_DEPLOY_KEY
#     on THIS repo (ftsiboe/ftsiboe).

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 12 * * 1"        # weekly, Monday 06:00 CST
  push:
    branches: [main]
    paths:
      - "data-raw/scripts/**"
      - "data-raw/publications/**/links.csv"
      - "data-raw/working-papers/**"
      - "data-raw/private-packages/**"

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0          # full history so the rebase-before-push below works

      - name: 🧰 Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true        # install pre-built binaries (fast, reliable)

      - name: 📝 Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: 🔧 System dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: 📚 Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::curl

      - name: 📊 Refresh Scholar metrics (non-fatal)
        run: Rscript data-raw/scripts/update_scholar_metrics.R || echo "metrics refresh skipped"

      - name: 🚀 Build all pages
        run: Rscript data-raw/scripts/render.R

      # PRIMARY OUTCOME: publish the live site first, so a hiccup committing the
      # generated files back to this repo (below) can never block the deploy.
      - name: 🌐 Deploy site to ftsiboe.github.io (root user-page)
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.ACTIONS_DEPLOY_KEY }}
          external_repository: ftsiboe/ftsiboe.github.io
          publish_branch: master          # user pages serve from the default branch
          publish_dir: ./docs              # the built Jekyll site (source, not pre-built HTML)
          enable_jekyll: true              # IMPORTANT: let GitHub Pages run Jekyll (no .nojekyll)
          force_orphan: true               # keep the deploy repo a single clean snapshot
          full_commit_message: "Deploy site from ftsiboe@${{ github.sha }}"

      - name: 💾 Commit built pages back to this repo (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs data-raw/scholar-metrics.json \
                  data-raw/publications/risk-management/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-build pages & metrics [skip ci]"
          fi
          # Push resiliently: if the branch advanced since checkout (concurrent
          # run or a manual push), rebase onto it and retry instead of failing.
          for i in 1 2 3; do
            git pull --rebase --autostash origin main \
              && git push origin main \
              && { echo "Pushed on attempt $i."; exit 0; }
            echo "Push attempt $i failed; refetching and retrying…"; sleep 5
          done
          echo "Could not push after 3 attempts." >&2; exit 1
