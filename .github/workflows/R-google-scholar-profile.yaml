name: Build site & refresh metrics

# One workflow that keeps the GitHub Pages site current:
#   1. refreshes data-raw/scholar-metrics.json from Google Scholar (live badges read it),
#   2. rebuilds every page from its .Rmd source via data-raw/scripts/render.R, and
#   3. commits any changes.
# The index builds from data-raw/publications/risk-management/links.csv (tracked),
# so it works in CI without the (gitignored) PDFs.

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 12 * * 1"        # weekly, Monday 06:00 CST
  push:
    branches: [main]
    paths:
      - "data-raw/scripts/**"
      - "data-raw/publications/**/links.csv"
      - "data-raw/working-papers/**"
      - "data-raw/private-packages/**"

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🧰 Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true        # install pre-built binaries (fast, reliable)

      - name: 📝 Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: 🔧 System dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: 📚 Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::curl

      - name: 📊 Refresh Scholar metrics (non-fatal)
        run: Rscript data-raw/scripts/update_scholar_metrics.R || echo "metrics refresh skipped"

      - name: 🚀 Build all pages
        run: Rscript data-raw/scripts/render.R

      - name: 💾 Commit & push (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs data-raw/scholar-metrics.json \
                  data-raw/publications/risk-management/README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Auto-build pages & metrics [skip ci]"
          git push
